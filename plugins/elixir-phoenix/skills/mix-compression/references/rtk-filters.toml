# ============================================================================
# mix deps.get — collapse "Unchanged" package list
# ============================================================================
[filters.mix-deps-get]
description = "Compact mix deps.get — collapse unchanged package lists"
match_command = "^(?:[A-Z_][A-Z0-9_]*=\\S+\\s+)*mix\\s+deps\\.get(\\s|$)"
strip_ansi = true
filter_stderr = true

match_output = [
  { pattern = "All dependencies (have been fetched|are up to date)", message = "mix deps.get: unchanged" },
]

strip_lines_matching = [
  "^$",
  "^\\s*$",
  "^OK$",
  "^Resolving Hex dependencies",
  "^Resolution completed in ",
  "^Unchanged:$",
  "^  [a-z_][a-z0-9_]* \\d+\\.\\d+",
  "^Compiling \\d+ file",
  "^Generated \\w+ app$",
]

on_empty = "mix deps.get: unchanged"

[[tests.mix-deps-get]]
name = "unchanged collapses"
input = """
Resolving Hex dependencies...
Resolution completed in 1.638s
Unchanged:
  abnf_parsec 2.1.0
  acceptor_pool 1.0.1
  algoliax 0.10.0
  credo 1.7.18
All dependencies have been fetched
OK
"""
expected = "mix deps.get: unchanged"

# ============================================================================
# mix ecto.migrate / rollback / gen.migration — strip compile prefix
# ============================================================================
[filters.mix-ecto-migrate]
description = "Compact mix ecto.migrate — strip compile prefix"
match_command = "^(?:[A-Z_][A-Z0-9_]*=\\S+\\s+)*mix\\s+ecto\\.(migrate|rollback|gen\\.migration)(\\s|$)"
strip_ansi = true
filter_stderr = true

match_output = [
  { pattern = "\\[info\\] Migrations already up", message = "mix ecto.migrate: up to date" },
]

strip_lines_matching = [
  "^$",
  "^\\s*$",
  "^OK$",
  "^Compiling \\d+ file",
  "^Generated \\w+ app$",
  "^\\d+> Compiling",
  "^\\d+> Generated",
]

on_empty = "mix ecto.migrate: ok"

[[tests.mix-ecto-migrate]]
name = "already up short-circuits"
input = """
Compiling 2 files (.ex)
Generated my_app app

06:54:27.843 [info] Migrations already up
"""
expected = "mix ecto.migrate: up to date"

# ============================================================================
# mix compile (extended) — handles parallel worker prefix `N> ` and MIX_ENV
# Shadows the built-in mix-compile filter.
# ============================================================================
[filters.mix-compile]
description = "Compact mix compile — handles parallel workers and MIX_ENV prefixes"
match_command = "^(?:[A-Z_][A-Z0-9_]*=\\S+\\s+)*mix\\s+compile(\\s|$)"
strip_ansi = true
filter_stderr = true

replace = [
  { pattern = "^\\d+> ", replacement = "" },
]

strip_lines_matching = [
  "^$",
  "^\\s*$",
  "^OK$",
  "^mix deps\\.compile running across \\d+ OS processes",
  "^Compiling \\d+ file",
  "^Generated \\w+ app$",
  "^==> \\w+$",
  "^===> (Compiling|Analyzing) ",
  "^\\[debug\\] Copying NIF ",
  "^AppSignal extension installation",
]

on_empty = "mix compile: ok"

[[tests.mix-compile]]
name = "parallel compile with worker prefix strips cleanly"
input = """
mix deps.compile running across 7 OS processes
2> ==> peri
2> Compiling 7 files (.ex)
3> ==> fine
3> Compiling 1 file (.ex)
3> Generated fine app
2> Generated peri app
Compiling 1821 files (.ex)
Generated my_app app
OK
"""
expected = "mix compile: ok"

[[tests.mix-compile]]
name = "preserves warning with file:line"
input = """
2> ==> peri
2> Compiling 7 files (.ex)
3>     warning: variable "assigns" is unused
3>     │
3> 183 │     defp prepare_icon_name(assigns) do
3>     │                            ~~~~~~~
3>     │
3>     └─ lib/icon.ex:183:28: Iconify.Icon.prepare_icon_name/1
2> Generated peri app
Compiling 1821 files (.ex)
Generated my_app app
"""
expected = """    warning: variable "assigns" is unused
    │
183 │     defp prepare_icon_name(assigns) do
    │                            ~~~~~~~
    │
    └─ lib/icon.ex:183:28: Iconify.Icon.prepare_icon_name/1"""
